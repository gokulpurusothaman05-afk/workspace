<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stackly Spaces</title>
  <meta name="description" content="Get in touch with the Stackly community management team. Visit us, request a callback, or send us a message.">
  
  <!-- CSS Library CDNs -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.4/aos.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/slick-carousel/1.8.1/slick.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/slick-carousel/1.8.1/slick-theme.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/OwlCarousel2/2.3.4/assets/owl.carousel.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/OwlCarousel2/2.3.4/assets/owl.theme.default.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/tiny-slider/2.9.4/tiny-slider.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/magnific-popup.js/1.1.0/magnific-popup.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/noUiSlider/15.7.1/nouislider.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-select/1.14.0-beta2/css/bootstrap-select.min.css">
  
  <!-- Local Styles -->
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- Dynamic Preloader Injector -->
  <div id="preloader-placeholder"></div>

  <!-- Dynamic Header Injector -->
  <div id="header-placeholder"></div>

  <main>
    <!-- SECTION 1: SUBPAGE HEADER -->
    <section class="bg-navy py-5 text-white position-relative" style="background-image: linear-gradient(to right, rgba(9, 23, 42, 0.9), rgba(9, 23, 42, 0.7));">
      <div class="container py-4 text-center">
        <h1 class="display-4 fw-bold text-white mb-2">Get In Touch</h1>
        <nav aria-label="breadcrumb">
          <ol class="breadcrumb justify-content-center mb-0">
            <li class="breadcrumb-item"><a href="index.html" class="text-warning text-decoration-none">Home</a></li>
            <li class="breadcrumb-item text-white active" aria-current="page">Contact</li>
          </ol>
        </nav>
      </div>
    </section>

    <!-- SECTION 2: CONTACT FORM -->
    <section class="section-padding bg-cream">
      <div class="container">
        <div class="row align-items-center g-5">
          <div class="col-lg-6" data-aos="fade-right">
            <span class="badge bg-warning text-navy mb-3 px-3 py-2 text-uppercase fw-semibold tracking-wider">Contact Form</span>
            <h2 class="display-5 fw-bold mb-4 text-navy">Send A Message</h2>
            <p class="text-muted mb-4 fs-5">Have custom workspace specs or need location tours? Fill out our form and a community representative will reply within 2 business hours.</p>
            <p class="text-muted"><i class="fa-solid fa-clock text-warning me-2"></i>Mon-Fri Desk Support: 9:00 AM - 6:00 PM</p>
          </div>
          <div class="col-lg-6" data-aos="fade-left">
            <div class="p-5 bg-white border border-light rounded shadow-sm">
              <form id="contact-us-form">
                <div class="mb-3">
                  <label class="form-label text-navy fw-semibold small">Full Name</label>
                  <input type="text" name="name" class="form-control" placeholder="E.g. Rajesh Kumar" required>
                </div>
                <div class="mb-3">
                  <label class="form-label text-navy fw-semibold small">Email Address</label>
                  <input type="email" name="email" class="form-control" placeholder="E.g. rajesh@infosys.com" required>
                </div>
                <div class="mb-3">
                  <label class="form-label text-navy fw-semibold small">Phone Number</label>
                  <input type="text" name="phone" class="form-control" placeholder="E.g. +91 981 500 3500" required>
                </div>
                <div class="mb-4">
                  <label class="form-label text-navy fw-semibold small">Your Message</label>
                  <textarea name="message" class="form-control" rows="4" placeholder="How can we help your team?" required></textarea>
                </div>
                <button type="submit" class="btn btn-warning w-100 rounded-pill py-3 fw-semibold">Send Message</button>
              </form>
            </div>
          </div>
        </div>
      </div>
    </section>

   
  <!-- Dynamic Footer Injector -->
  <div id="footer-placeholder"></div>

  <!-- JavaScript Library CDNs -->
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <script src="https://code.jquery.com/ui/1.13.2/jquery-ui.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-select/1.14.0-beta2/js/bootstrap-select.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.4/aos.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/slick-carousel/1.8.1/slick.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/OwlCarousel2/2.3.4/owl.carousel.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/tiny-slider/2.9.4/tiny-slider.js"></script>
  <script src="https://unpkg.com/isotope-layout@3/dist/isotope.pkgd.min.js"></script>
  <script src="https://unpkg.com/imagesloaded@5/imagesloaded.pkgd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jarallax/2.0.4/jarallax.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/lettering.js/0.7.0/jquery.lettering.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/circletype@2.3.0/dist/circletype.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/magnific-popup.js/1.1.0/jquery.magnific-popup.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery-validate/1.19.5/jquery.validate.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery-appear/0.1.1/jquery.appear.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery.countdown/2.2.0/jquery.countdown.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/noUiSlider/15.7.1/nouislider.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/wnumb/1.2.0/wNumb.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
  
  <!-- Custom Shared & Main JS -->
  <script src="js/components.js"></script>
  <script src="js/app.js"></script>
  
  <script>
    $(document).ready(function() {
      // Callback validation
      if ($.fn.validate) {
        $("#callback-request-form").validate({
          submitHandler: function(form) {
            alert("Callback request received! An associate will dial you in 15 minutes.");
            form.reset();
            return false;
          }
        });
        
        // Survey Form submit handler
        $("#feedback-survey-form").submit(function(e) {
          e.preventDefault();
          alert("Thank you for submitting your design preference survey!");
          this.reset();
        });
      }
    });
  </script>
</body>
</html>
