<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Not Found</title>
  <meta name="description" content="The page you are looking for does not exist or has been moved.">
  
  <!-- CSS Library CDNs -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.4/aos.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css">
  
  <!-- Local Styles -->
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-navy text-white d-flex align-items-center justify-content-center" style="min-height: 100vh;">

  <div class="container text-center py-5" data-aos="zoom-in">
    <div class="row justify-content-center">
      <div class="col-lg-6 col-md-8 col-sm-10">
        <span class="text-warning display-1 fw-bold mb-4 d-block animate__animated animate__bounce"><i class="fa-solid fa-triangle-exclamation"></i> 404</span>
        <h1 class="display-5 fw-bold text-white mb-3">Oops! Page Under Construction</h1>
        <p class="text-secondary-white mb-5 fs-5">This action, link, or space description is currently being constructed. Return to Stackly home to book a workspace.</p>
        <a href="index.html" class="btn btn-warning btn-lg rounded-pill px-5 hover-grow"><i class="fa-solid fa-house me-2"></i>Back to Home</a>
      </div>
    </div>
  </div>

  <!-- JavaScript Library CDNs -->
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.4/aos.js"></script>
  
  <script>
    $(document).ready(function() {
      if (typeof AOS !== 'undefined') {
        AOS.init();
      }
    });
  </script>
</body>
</html>
