<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stackly Spaces</title>
  <meta name="description" content="Register an account for the Stackly client coworking portal.">
  
  <!-- CSS Library CDNs -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.4/aos.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/magnific-popup.js/1.1.0/magnific-popup.min.css">
  
  <!-- Local Styles -->
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-cream">

  <!-- Dynamic Preloader Injector -->
  <div id="preloader-placeholder"></div>

  <!-- Dynamic Header Injector -->
  <div id="header-placeholder"></div>

  <main class="d-flex align-items-center justify-content-center" style="min-height: 80vh;">
    <div class="container my-5">
      <div class="row justify-content-center">
        <div class="col-lg-6 col-md-8 col-sm-10" data-aos="zoom-in">
          
          <!-- Outer signup card -->
          <div class="card border-0 shadow-lg rounded-4 overflow-hidden">
            <div class="card-header bg-navy text-center py-4 border-0">
              <h3 class="text-white fw-bold mb-2"><span class="text-warning"><i class="fa-solid fa-layer-group me-2"></i>Stack</span>ly Sign Up</h3>
              <p class="text-secondary-white mb-0 small">Create your account to access client dashboard</p>
            </div>
            
            <div class="card-body p-5">
              <form id="signup-form">
                <div class="mb-3">
                  <label class="form-label text-navy fw-semibold small">Gmail Address</label>
                  <div class="input-group">
                    <span class="input-group-text bg-light"><i class="fa-regular fa-envelope text-muted"></i></span>
                    <input type="email" name="signupEmail" id="signupEmail" class="form-control" placeholder="E.g. yourname@gmail.com" required>
                  </div>
                </div>
                <div class="mb-3">
                  <label class="form-label text-navy fw-semibold small">Password</label>
                  <div class="input-group">
                    <span class="input-group-text bg-light"><i class="fa-solid fa-lock text-muted"></i></span>
                    <input type="password" name="signupPassword" id="signupPassword" class="form-control" placeholder="••••••••" required>
                  </div>
                </div>
                <div class="mb-4">
                  <label class="form-label text-navy fw-semibold small">Confirm Password</label>
                  <div class="input-group">
                    <span class="input-group-text bg-light"><i class="fa-solid fa-lock text-muted"></i></span>
                    <input type="password" name="signupConfirmPassword" id="signupConfirmPassword" class="form-control" placeholder="••••••••" required>
                  </div>
                </div>
                <button type="submit" class="btn btn-warning w-100 rounded-pill py-3 fw-bold"><i class="fa-solid fa-user-plus me-2"></i>Register & Login</button>
              </form>
              
              <div class="text-center mt-4">
                <p class="small text-muted mb-0">Already have an account? <a href="login.html" class="text-warning fw-semibold text-decoration-none">Login Here</a></p>
              </div>
            </div>
            
          </div>
          
        </div>
      </div>
    </div>
  </main>

  <!-- Dynamic Footer Injector -->
  <div id="footer-placeholder"></div>

  <!-- JavaScript Library CDNs -->
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.4/aos.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery-validate/1.19.5/jquery.validate.min.js"></script>
  
  <!-- Custom Shared & Main JS -->
  <script src="js/components.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
